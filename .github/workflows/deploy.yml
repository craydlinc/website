name: Deploy Website

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TOFU_VERSION: "1.9.0"
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  CF_DISTRIBUTION_ID: ${{ secrets.CF_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Get S3 bucket + distribution ID ---
      - name: Resolve deploy targets
        id: tf
        run: |
          if [ -n "$S3_BUCKET" ] && [ -n "$CF_DISTRIBUTION_ID" ]; then
            echo "website_bucket=$S3_BUCKET" >> "$GITHUB_OUTPUT"
            echo "distribution_id=$CF_DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"
          else
            # Fall back to Tofu outputs
            pip install opentofu-bin 2>/dev/null || true
            cd infra && tofu init -input=false
            echo "website_bucket=$(tofu output -raw website_bucket)" >> "$GITHUB_OUTPUT"
            echo "distribution_id=$(tofu output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          fi

      # --- Update CloudFront Function when redirects.js changes ---
      - name: Check for redirects changes
        id: redirects
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'infra/redirects.js'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update CloudFront Function
        if: steps.redirects.outputs.changed == 'true'
        run: |
          FUNC_NAME="craydl-redirects"
          echo "Updating CloudFront Function: $FUNC_NAME"
          ETAG=$(aws cloudfront describe-function --name "$FUNC_NAME" --query 'ETag' --output text)
          aws cloudfront update-function \
            --name "$FUNC_NAME" \
            --if-match "$ETAG" \
            --function-config '{"Comment":"Redirects and directory index rewrite","Runtime":"cloudfront-js-2.0"}' \
            --function-code fileb://infra/redirects.js
          ETAG=$(aws cloudfront describe-function --name "$FUNC_NAME" --query 'ETag' --output text)
          aws cloudfront publish-function --name "$FUNC_NAME" --if-match "$ETAG"
          echo "CloudFront Function published"

      # --- Deploy static site ---
      - name: Sync site to S3
        run: |
          aws s3 sync . "s3://${{ steps.tf.outputs.website_bucket }}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "Media/*" \
            --exclude "infra/*" \
            --exclude "aws/*" \
            --exclude "docs/*" \
            --exclude "react/*" \
            --exclude "craydl-app/*" \
            --exclude "workers/*" \
            --exclude "node_modules/*" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude ".gitattributes" \
            --exclude ".DS_Store" \
            --exclude ".claude/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"
