name: Deploy Website

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TOFU_VERSION: "1.9.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Detect infra changes ---
      - name: Check for infra changes
        id: infra
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^infra/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # --- Infrastructure (only when infra/ changes) ---
      - name: Setup OpenTofu
        if: steps.infra.outputs.changed == 'true'
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu Init
        if: steps.infra.outputs.changed == 'true'
        working-directory: infra
        run: tofu init -input=false

      - name: Tofu Apply
        if: steps.infra.outputs.changed == 'true'
        working-directory: infra
        run: tofu apply -auto-approve -input=false

      # --- Get outputs (always needed for deploy) ---
      - name: Setup OpenTofu (for outputs)
        if: steps.infra.outputs.changed != 'true'
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Get Tofu outputs
        id: tf
        working-directory: infra
        run: |
          tofu init -input=false
          echo "website_bucket=$(tofu output -raw website_bucket)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(tofu output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      # --- Deploy static site ---
      - name: Sync site to S3
        run: |
          aws s3 sync . "s3://${{ steps.tf.outputs.website_bucket }}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "Media/*" \
            --exclude "infra/*" \
            --exclude "aws/*" \
            --exclude "docs/*" \
            --exclude "react/*" \
            --exclude "craydl-app/*" \
            --exclude "workers/*" \
            --exclude "node_modules/*" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude ".gitattributes" \
            --exclude ".DS_Store" \
            --exclude ".claude/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"
