# Sync Media/ to S3 → Lambda copies to DAM + writes 4 audience WebP trees on CDN.
#
# Secrets (repo): MEDIA_STAGING_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION (optional)
# Prefer OIDC? Replace the configure-aws-credentials step with role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
# and add permissions.id-token: write — see docs/AWS_MEDIA_PIPELINE.md

name: Media → S3 (DAM pipeline)

on:
  push:
    branches: [main, master]
    paths:
      - 'Media/**'

jobs:
  sync-media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Upload Media to staging (triggers Lambda per object)
        env:
          BUCKET: ${{ secrets.MEDIA_STAGING_BUCKET }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$BUCKET" ]; then
            echo "::error::Set repository secret MEDIA_STAGING_BUCKET (SAM output StagingBucketName)"
            exit 1
          fi
          aws s3 sync Media/ "s3://${BUCKET}/incoming/${SHA}/" \
            --exclude "README.md" \
            --exclude ".gitkeep" \
            --exclude ".DS_Store"
