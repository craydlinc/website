# Sync Media/ to S3 → Lambda copies to DAM + writes 4 audience WebP trees on CDN.
#
# Secrets (repo): AWS_ROLE_ARN, AWS_REGION (optional)

name: Media → S3 (DAM pipeline)

on:
  push:
    branches: [main]
    paths:
      - 'Media/**'

permissions:
  id-token: write
  contents: read

jobs:
  sync-media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Get staging bucket name from Tofu
        id: tf
        working-directory: infra
        run: |
          # Install OpenTofu to read outputs
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | bash -s -- --install-method standalone
          tofu init -input=false
          echo "bucket=$(tofu output -raw staging_bucket)" >> "$GITHUB_OUTPUT"

      - name: Upload Media to staging (triggers Lambda per object)
        env:
          BUCKET: ${{ steps.tf.outputs.bucket }}
          SHA: ${{ github.sha }}
        run: |
          aws s3 sync Media/ "s3://${BUCKET}/incoming/${SHA}/" \
            --exclude "README.md" \
            --exclude ".gitkeep" \
            --exclude ".DS_Store"
