name = "craydl-autoseo-webhook"
main = "src/index.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "craydl.com/api/webhooks*", zone_name = "craydl.com" }
]
workers_dev = true

[vars]
GITHUB_REPO = "craydlinc/website"
GITHUB_BRANCH = "main"

# GITHUB_TOKEN is set as a secret via: wrangler secret put GITHUB_TOKEN
